{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.sidebar{
width:230px;
height:100vh;
background:#111;
position:fixed;
padding-top:30px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#e11f21;
}

.content{
margin-left:250px;
padding:40px;
}

.card{
border:none;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h4 class="text-center text-white mb-4">Admin</h4>

<a href="{% url 'admin_dashboard' %}">Dashboard</a>
<a href="{% url 'admin_add_product' %}">Add Products</a>
<a href="{% url 'inventory' %}">Inventory</a>
<a href="{% url 'admin_categories' %}">Categories</a>
<a href="{% url 'admin_orders' %}">Orders</a>
<a href="{% url 'admin_reports' %}">Reports</a>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

</body>
</html>
