{% extends "admin/base_admin.html" %}

{% block content %}

<h2>Categories</h2>

<a href="{% url 'admin_add_category' %}" class="btn btn-primary mb-3">
Add Category
</a>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Slug</th>
<th>Action</th>
</tr>

{% for category in categories %}

<tr>

<td>{{ category.name }}</td>
<td>{{ category.slug }}</td>

<td>

<a href="{% url 'admin_delete_category' category.id %}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
