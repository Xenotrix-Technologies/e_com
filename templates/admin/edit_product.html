{% extends "admin/base_admin.html" %}

{% block content %}

<div class="container mt-4">

<h2 class="mb-4">Edit Product</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Product Name</label>
<input type="text" name="name" value="{{ product.name }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Slug</label>
<input type="text" name="slug" value="{{ product.slug }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" rows="4" class="form-control" required>{{ product.description }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Stock Quantity</label>
<input type="number" name="stock" value="{{ product.stock }}" class="form-control" min="0" required>
<small class="text-muted">Update available inventory quantity</small>
</div>

<div class="mb-3">
<label class="form-label">Category</label>

<select name="category" class="form-control" required>

{% for category in categories %}

<option value="{{ category.id }}"
{% if product.category.id == category.id %}selected{% endif %}>
{{ category.name }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">
<label class="form-label">Product Image</label>
<input type="file" name="image" class="form-control">

{% if product.image %}
<br>
<img src="{{ product.image.url }}" width="120" class="rounded">
{% endif %}

</div>

<div class="form-check mb-3">

<input type="checkbox" name="is_available"
class="form-check-input"
{% if product.is_available %}checked{% endif %}>

<label class="form-check-label">
Available
</label>

</div>

<button type="submit" class="btn btn-success">
Update Product
</button>

</form>

</div>

{% endblock %}
