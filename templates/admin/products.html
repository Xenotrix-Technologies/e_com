{% extends "admin/base_admin.html" %}

{% block content %}

<h2 class="mb-4">Products</h2>

<a href="{% url 'admin_add_product' %}" class="btn btn-primary mb-3">
Add Product
</a>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Image</th>
<th>Action</th>
</tr>

{% for product in products %}

<tr>

<td>{{ product.name }}</td>

<td>₹{{ product.price }}</td>

<td>{{ product.category.name }}</td>

<td>
<img src="{{ product.image.url }}" width="60">
</td>

<td>

<a href="{% url 'admin_edit_product' product.id %}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="{% url 'admin_delete_product' product.id %}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
